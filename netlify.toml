[build]
  publish = "."
  functions = "netlify/functions"

[functions.playlist]
  included_files = ["config/playlist.json"]

[[redirects]]
  from = "/api/playlist"
  to = "/.netlify/functions/playlist"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/media/*"
  to = "/.netlify/functions/media"
  status = 200
