<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Signage</title>
  <link rel="stylesheet" href="./styles.css?v=preview-9" />
</head>
<body>
  <main id="app" class="screen">
    <video id="videoPlayer" class="media hidden" autoplay muted playsinline></video>
    <img id="imagePlayer" class="media hidden" alt="Publicidade" />

    <div id="weatherWidget" class="weather-widget hidden">
      <div class="weather-icon" id="weatherIcon" aria-hidden="true"></div>
      <div class="weather-main">
        <div class="weather-period" id="weatherPeriod"></div>
        <div class="weather-temp" id="weatherTemp"></div>
        <div class="weather-desc" id="weatherDesc"></div>
        <div class="weather-time" id="weatherTime"></div>
      </div>
    </div>
  </main>

  <script src="./app.js?v=preview-9"></script>
</body>
</html>
